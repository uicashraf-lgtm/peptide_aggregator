## Step 4 — Test It
From now on, every time you upload or change files in GitHub:
- GitHub Actions automatically runs
- Your files get pushed to your website via FTP

To check it worked go to your repo → **Actions tab** → you'll see a green checkmark if it succeeded or red X if something went wrong.

